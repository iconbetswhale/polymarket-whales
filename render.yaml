services:
  - type: web
    name: iconbets-polymarket-wallet-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 app:app
    healthCheckPath: /health
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DASHBOARD_REFRESH
        value: 120
      - key: SPORTS_ONLY
        value: true
      - key: RESOLVE_HOURS
        value: 168
      - key: REQUEST_TIMEOUT
        value: 15
      - key: MAX_RETRIES
        value: 3
      - key: DATABASE_PATH
        value: /var/data/polymarket_tracker.db
