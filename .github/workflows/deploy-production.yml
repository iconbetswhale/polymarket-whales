name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: iconbets-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install and test
        run: |
          python -m pip install -r requirements.txt
          python -m pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0

      - name: Link production project
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Reconcile Model Tracker and verify Discord delivery
        env:
          TRACKER_JOB_SECRET: ${{ secrets.TRACKER_JOB_SECRET }}
        run: |
          response="$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TRACKER_JOB_SECRET" \
            --header "Content-Type: application/json" \
            --data '{"force":false}' \
            https://iconbets-polymarket-wallet-tracker.vercel.app/api/admin/model-tracker/reconcile)"
          DISCORD_RESULT="$response" python - <<'PY'
          import json, os
          data = json.loads(os.environ["DISCORD_RESULT"]).get("data", {})
          discord = data.get("discord_notifications", {})
          print(
              "Discord Model Tracker: "
              f"enabled={bool(discord.get('enabled'))} "
              f"configured={bool(discord.get('configured'))} "
              f"status={discord.get('status', 'unknown')} "
              f"error={discord.get('connection_error', 'none')} "
              f"delivered={int(discord.get('delivered') or 0)} "
              f"retrying={int(discord.get('retrying') or 0)} "
              f"failed={int(discord.get('failed') or 0)}"
          )
          PY

      - name: Send requested one-time Discord test
        if: github.event_name == 'push' && contains(github.event.head_commit.message, '[discord-test]')
        env:
          TRACKER_JOB_SECRET: ${{ secrets.TRACKER_JOB_SECRET }}
        run: |
          response="$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TRACKER_JOB_SECRET" \
            --header "Content-Type: application/json" \
            --data "{\"nonce\":\"${GITHUB_SHA:0:25}\"}" \
            https://iconbets-polymarket-wallet-tracker.vercel.app/api/admin/discord-notifications/test)"
          printf '%s' "$response" | python -c '
          import json, sys
          data = json.load(sys.stdin)
          print(
              "Discord test: "
              f"status={data.get('"'"'status'"'"', '"'"'unknown'"'"')} "
              f"delivered={bool(data.get('"'"'delivered'"'"'))}"
          )
          '

      - name: Verify ProphetX authentication
        env:
          TRACKER_JOB_SECRET: ${{ secrets.TRACKER_JOB_SECRET }}
        run: |
          response="$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TRACKER_JOB_SECRET" \
            https://iconbets-polymarket-wallet-tracker.vercel.app/api/provider-health/prophetx)"
          status="$(printf '%s' "$response" | python -c 'import json,sys; print(json.load(sys.stdin).get("status", "connection failed"))')"
          printf 'ProphetX provider status: %s\n' "$status"
          if [ "$status" != "authenticated" ]; then
            printf '::warning::ProphetX provider status: %s\n' "$status"
          fi
